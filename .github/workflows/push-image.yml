name: Docker Build/Publish Image
on:
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate build tag
        id: vars
        run: echo "TAG=$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        name: Build and push
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            lkiran/django-home:latest
            lkiran/django-home:${{ steps.vars.outputs.TAG }}
          cache-from: type=registry,ref=lkiran/django-home:buildcache
          cache-to: type=registry,ref=lkiran/django-home:buildcache,mode=max