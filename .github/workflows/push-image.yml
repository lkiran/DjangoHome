name: 🐳 Docker Build / Publish Image
run-name: Build ${{ inputs.environment }}
on:
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  docker:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏷️ Generate Build Tag
        id: vars
        run: |
          TAG=$(date +'%Y%m%d')-${GITHUB_RUN_NUMBER}
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "GITHUB_RUN_NAME=$TAG" >> $GITHUB_ENV

      - name: 🧰 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            lkiran/django-home:latest
            lkiran/django-home:${{ steps.vars.outputs.TAG }}
          cache-from: |
            type=gha
            type=registry,ref=lkiran/django-home:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=lkiran/django-home:buildcache,mode=max